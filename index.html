<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAIWOLF 即時叫號</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    text-align:center;
}

h1{
    font-size:36px;
    margin-bottom:20px;
}

#number{
    font-size:100px;
    color:#0077ff;
    font-weight:bold;
}

#time{
    margin-top:20px;
    color:#666;
}
</style>
</head>

<body>

<div class="card">
    <h1>目前叫號</h1>

    <div id="number">讀取中...</div>

    <div id="time"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBDyEH02iQZnpm3q7ebdJl5gyoqv3Um7hM",
    authDomain: "taiwolf-5a279.firebaseapp.com",
    databaseURL: "https://taiwolf-5a279-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "taiwolf-5a279",
    storageBucket: "taiwolf-5a279.firebasestorage.app",
    messagingSenderId: "154565480180",
    appId: "1:154565480180:web:22400fd7bc383b7bbc18a1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const queueRef = ref(db, "queue");

onValue(queueRef, (snapshot)=>{

    const data = snapshot.val();

    if(data){

        document.getElementById("number").innerText = data.number;

        document.getElementById("time").innerText =
        "更新時間：" + data.time;

    }

});

</script>

</body>
</html>
